<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sale Pro Connect - Super Coconut</title>
    <!-- โหลด Library ที่จำเป็นจาก CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#FAF9F6] antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ส่วนแสดงผลไอคอน
        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name, className]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [currentView, setCurrentView] = useState('homeView');
            const [loading, setLoading] = useState(false);
            const [historyLoading, setHistoryLoading] = useState(false);
            const [status, setStatus] = useState({ msg: '', type: '' });
            const [location, setLocation] = useState('กำลังระบุพิกัด...');
            const [imagePreview, setImagePreview] = useState(null);
            const [historyData, setHistoryData] = useState([]);
            
            const [filterName, setFilterName] = useState('');
            // ตั้งค่าวันที่ปัจจุบัน (31 มีนาคม 2026 ตามรายงาน)
            const [filterDate, setFilterDate] = useState('2026-03-31');

            const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz6pxzMrB8kYpLtdyJlnMmw4Hegf3KhhGMLL-ataT4JfMZiYvGXYD37eQj9qhMWZjShTQ/exec";
            
            // 1. ปรับชื่อพนักงานขายเป็นตามเดิม (ชื่อ-นามสกุลเต็ม)
            const saleNames = [
                "เยาวมาลย์ เกียรติเฉลิมพร", 
                "วลีพัชร นามวงศ์", 
                "สุวิจักขณ์ มั่งคั่ง", 
                "ชลชญา นิกรรัมย์", 
                "โชติกา เจริญใจ", 
                "วชิรญาณ์ ปานมณี", 
                "คงชลัช ธนยารุ่งรวิน", 
                "ปาณิศา หยองทอง"
            ];

            useEffect(() => {
                fetchHistory(); // โหลดครั้งแรกสำหรับหน้าโฮม
            }, []);

            useEffect(() => {
                if (currentView === 'formView') fetchLocation();
            }, [currentView]);

            // 2. ระบบกรองข้อมูลจาก "วันที่บันทึก" และ "ชื่อพนักงานขาย"
            const filteredHistory = useMemo(() => {
                if (!Array.isArray(historyData)) return [];
                return historyData.filter(item => {
                    // ดึงค่าจากหัวตาราง "ชื่อพนักงานขาย" และ "วันที่บันทึก"
                    const nameInSheet = item["ชื่อพนักงานขาย"] || "";
                    const dateInSheet = item["วันที่บันทึก"] || ""; 
                    
                    // ตรวจสอบชื่อ (ถ้ามีการเลือก)
                    // หมายเหตุ: หากใน Sheet ชื่อถูกตัดสั้น เราจะใช้ startsWith เพื่อความยืดหยุ่น
                    const matchName = filterName === '' || nameInSheet.includes(filterName) || filterName.includes(nameInSheet);
                    
                    // ตรวจสอบวันที่ (กรองเฉพาะปี-เดือน-วัน)
                    const matchDate = filterDate === '' || dateInSheet.startsWith(filterDate);
                    
                    return matchName && matchDate;
                });
            }, [historyData, filterName, filterDate]);

            const fetchHistory = async () => {
                setHistoryLoading(true);
                try {
                    const response = await fetch(WEB_APP_URL);
                    if (!response.ok) throw new Error('Network error');
                    const data = await response.json();
                    setHistoryData(Array.isArray(data) ? data : []);
                } catch (err) {
                    console.error("Fetch failed", err);
                    setStatus({ msg: 'ไม่สามารถโหลดข้อมูลได้ โปรดตรวจสอบการเชื่อมต่อ', type: 'error' });
                } finally {
                    setHistoryLoading(false);
                }
            };

            const fetchLocation = () => {
                setLocation('กำลังค้นหาพิกัด GPS...');
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => setLocation(`${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`),
                        (err) => setLocation("ไม่สามารถระบุตำแหน่งได้"),
                        { enableHighAccuracy: true, timeout: 5000 }
                    );
                }
            };

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setImagePreview(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setStatus({ msg: '', type: '' });
                const formData = new FormData(e.target);
                const payload = {
                    reportDate: new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' }),
                    saleName: formData.get('saleName'),
                    shopName: formData.get('shopName'),
                    customerName: formData.get('customerName'),
                    customerPhone: formData.get('customerPhone'),
                    leadId: formData.get('leadId'),
                    location: location,
                    image: imagePreview
                };

                try {
                    const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await res.json();
                    if (result.result === 'success') {
                        setStatus({ msg: 'บันทึกสำเร็จเรียบร้อย!', type: 'success' });
                        e.target.reset();
                        setImagePreview(null);
                        fetchHistory();
                        setTimeout(() => setCurrentView('homeView'), 2000);
                    } else { throw new Error(result.error); }
                } catch (err) { setStatus({ msg: 'ผิดพลาด: ' + err.message, type: 'error' }); }
                finally { setLoading(false); }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-28 relative overflow-hidden bg-[#FAF9F6]">
                    {/* Header */}
                    <header className="bg-[#FFC107] p-5 shadow-md sticky top-0 z-30 rounded-b-[2rem] border-b border-yellow-500 flex items-center justify-between">
                        <div>
                            <p className="text-[10px] font-bold uppercase tracking-widest text-black/50 leading-none">Super Coconut</p>
                            <h1 className="text-xl font-bold text-black leading-tight">Sale Pro Connect</h1>
                        </div>
                        <div className="text-right">
                            <div className="bg-white/40 py-1.5 px-3 rounded-full border border-black/5 text-[10px] font-bold text-black">
                                Super Coconut.co.Ltd
                            </div>
                        </div>
                    </header>

                    <main className="p-4">
                        {/* HOME VIEW */}
                        {currentView === 'homeView' && (
                            <div className="space-y-6 animate-in">
                                <div className="bg-gradient-to-br from-[#FFC107] to-[#FF9800] p-7 rounded-[2rem] text-black shadow-xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h2 className="text-2xl font-bold mb-1 italic">ยินดีต้อนรับ!</h2>
                                        <p className="text-black/70 text-sm">บันทึกงานที่ยอดเยี่ยมของคุณที่นี่</p>
                                        <button onClick={() => setCurrentView('formView')} className="mt-5 bg-black text-white px-8 py-3 rounded-2xl font-bold shadow-lg flex items-center gap-2 active:scale-95 transition-all">
                                            <Icon name="map-pin" className="w-4 h-4 text-[#FFC107]" /> เริ่มเช็คอิน
                                        </button>
                                    </div>
                                    <Icon name="sun" className="absolute -right-6 -bottom-6 w-36 h-36 opacity-10" />
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-stone-100 text-center">
                                        <div className="bg-yellow-100 p-3 rounded-2xl mb-2 inline-block"><Icon name="check-circle" className="text-yellow-600 w-6 h-6" /></div>
                                        <p className="text-stone-400 text-[10px] font-bold uppercase">วันนี้</p>
                                        <p className="text-2xl font-bold text-stone-800 uppercase">
                                            {historyLoading ? '...' : historyData.filter(i => (i['วันที่บันทึก'] || '').startsWith('2026-03-31')).length} ราย
                                        </p>
                                    </div>
                                    <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-stone-100 text-center">
                                        <div className="bg-stone-50 p-3 rounded-2xl mb-2 inline-block"><Icon name="clock" className="text-stone-400 w-6 h-6" /></div>
                                        <p className="text-stone-400 text-[10px] font-bold uppercase">เวลาล่าสุด</p>
                                        <p className="text-2xl font-bold text-stone-800">{historyData[0] ? (historyData[0]['วันที่บันทึก'] || '').split(' ')[1]?.substring(0, 5) : '--:--'}</p>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <h3 className="text-stone-400 font-bold px-2 text-[10px] uppercase tracking-widest">เมนูแอป</h3>
                                    <button onClick={() => setCurrentView('formView')} className="w-full flex items-center gap-4 bg-white p-5 rounded-[1.5rem] shadow-sm border border-stone-100 active:bg-stone-50 text-left">
                                        <div className="bg-yellow-400/20 p-3 rounded-2xl text-yellow-700"><Icon name="file-text" /></div>
                                        <div className="flex-1"><p className="font-bold text-sm">ส่งรายงานใหม่</p><p className="text-stone-400 text-[10px]">บันทึกข้อมูลและพิกัดร้านค้า</p></div>
                                        <Icon name="chevron-right" className="text-stone-300" />
                                    </button>
                                    <button onClick={() => setCurrentView('historyView')} className="w-full flex items-center gap-4 bg-white p-5 rounded-[1.5rem] shadow-sm border border-stone-100 active:bg-stone-50 text-left">
                                        <div className="bg-stone-900 text-white p-3 rounded-2xl"><Icon name="refresh-cw" /></div>
                                        <div className="flex-1"><p className="font-bold text-sm">ดูประวัติ</p><p className="text-stone-400 text-[10px]">ตรวจสอบงานย้อนหลัง</p></div>
                                        <Icon name="chevron-right" className="text-stone-300" />
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* FORM VIEW */}
                        {currentView === 'formView' && (
                            <div className="space-y-4 animate-in">
                                <div className="flex items-center gap-3 mb-2 px-1">
                                    <button onClick={() => setCurrentView('homeView')} className="p-2.5 bg-white rounded-2xl shadow-sm"><Icon name="arrow-left" className="w-5 h-5 text-stone-600" /></button>
                                    <h2 className="text-lg font-bold">บันทึกข้อมูล</h2>
                                </div>
                                <form onSubmit={handleSubmit} className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-stone-100 space-y-6">
                                    <div>
                                        <label className="text-[10px] font-bold text-stone-400 uppercase ml-1 tracking-widest block mb-1">พนักงานขาย</label>
                                        <select name="saleName" required defaultValue="" className="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl outline-none focus:ring-2 focus:ring-[#FFC107] font-medium appearance-none">
                                            <option value="" disabled>เลือกชื่อของคุณ</option>
                                            {saleNames.map(n => <option key={n} value={n}>{n}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-4">
                                        <input type="text" name="shopName" required placeholder="ชื่อร้านค้า" className="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl focus:ring-2 focus:ring-[#FFC107] outline-none" />
                                        <input type="text" name="customerName" required placeholder="ชื่อลูกค้า" className="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl focus:ring-2 focus:ring-[#FFC107] outline-none" />
                                        <input type="tel" name="customerPhone" required placeholder="เบอร์โทรศัพท์" className="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl focus:ring-2 focus:ring-[#FFC107] outline-none" />
                                        <input type="text" name="leadId" placeholder="Lead ID (ถ้ามี)" className="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl focus:ring-2 focus:ring-[#FFC107] outline-none" />
                                    </div>
                                    <div className="bg-yellow-50 p-5 rounded-2xl border border-yellow-100">
                                        <div className="flex justify-between items-center mb-1">
                                            <p className="text-[10px] font-bold text-yellow-800 uppercase tracking-widest">📍 พิกัด GPS ปัจจุบัน</p>
                                            <button type="button" onClick={fetchLocation} className="bg-yellow-200 hover:bg-yellow-300 text-yellow-800 text-[9px] font-black px-2 py-1 rounded-full transition-all">อัปเดต</button>
                                        </div>
                                        <p className="text-xs font-mono font-bold text-yellow-900 break-all">{location}</p>
                                    </div>
                                    <div className="space-y-3">
                                        {imagePreview ? (
                                            <div className="relative">
                                                <img src={imagePreview} className="w-full h-48 object-cover rounded-3xl border-2 border-yellow-100 shadow-inner" />
                                                <button type="button" onClick={() => setImagePreview(null)} className="absolute top-2 right-2 bg-black/50 text-white p-2 rounded-full">✕</button>
                                            </div>
                                        ) : (
                                            <button type="button" onClick={() => document.getElementById('camera').click()} className="w-full py-12 border-2 border-dashed border-stone-200 rounded-[2rem] text-stone-400 bg-stone-50/50 flex flex-col items-center gap-2 active:bg-stone-50 transition-all">
                                                <Icon name="camera" className="opacity-40" /><span className="text-xs font-bold uppercase tracking-wider">กดเพื่อถ่ายรูปหน้าร้าน</span>
                                            </button>
                                        )}
                                        <input id="camera" type="file" accept="image/*" className="hidden" onChange={handleImageChange} />
                                    </div>
                                    <button type="submit" disabled={loading} className="w-full bg-[#FFC107] text-black font-bold py-5 rounded-[2rem] shadow-xl shadow-yellow-200 active:scale-95 transition-all">
                                        {loading ? '⌛ กำลังส่งข้อมูล...' : '🚀 ส่งรายงานเช็คอิน'}
                                    </button>
                                    {status.msg && <div className={`p-4 rounded-2xl text-center text-xs font-bold ${status.type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>{status.msg}</div>}
                                </form>
                            </div>
                        )}

                        {/* HISTORY VIEW */}
                        {currentView === 'historyView' && (
                            <div className="space-y-4 animate-in">
                                <div className="flex items-center gap-3 mb-2 px-1">
                                    <button onClick={() => setCurrentView('homeView')} className="p-2.5 bg-white rounded-2xl shadow-sm"><Icon name="arrow-left" className="w-5 h-5 text-stone-600" /></button>
                                    <h2 className="text-lg font-bold">ประวัติการเข้าพบ</h2>
                                </div>
                                <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-stone-100 space-y-4">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <p className="text-[9px] font-bold text-stone-400 uppercase ml-1">พนักงาน</p>
                                            <select value={filterName} onChange={(e) => setFilterName(e.target.value)} className="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-[#FFC107]">
                                                <option value="">ทั้งหมด</option>
                                                {saleNames.map(n => <option key={n} value={n}>{n}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <p className="text-[9px] font-bold text-stone-400 uppercase ml-1">วันที่</p>
                                            <input type="date" value={filterDate} onChange={(e) => setFilterDate(e.target.value)} className="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-[#FFC107]" />
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-2 pt-2 border-t border-stone-50">
                                        <button 
                                            onClick={fetchHistory} 
                                            disabled={historyLoading}
                                            className="w-full py-3.5 bg-[#FFC107] text-black font-black rounded-2xl text-xs uppercase tracking-widest active:scale-[0.98] transition-all shadow-md flex items-center justify-center gap-2"
                                        >
                                            {historyLoading ? <Icon name="refresh-cw" className="w-4 h-4 animate-spin" /> : <Icon name="check" className="w-4 h-4" />}
                                            ยืนยันการดึงข้อมูล
                                        </button>
                                        <button 
                                            onClick={() => { setFilterName(''); setFilterDate('2026-03-31'); }} 
                                            className="w-full py-2.5 bg-stone-100 text-stone-400 rounded-2xl text-[10px] font-bold uppercase tracking-widest active:bg-stone-200 transition-all"
                                        >
                                            รีเซ็ตตัวกรอง
                                        </button>
                                    </div>
                                </div>

                                <div className="space-y-4 px-1 pb-10">
                                    <p className="text-[10px] font-bold text-stone-400 uppercase tracking-tighter">พบรายการ {filteredHistory.length} จาก {historyData.length} แถว</p>
                                    
                                    {historyLoading ? (
                                        <div className="text-center py-20">
                                            <Icon name="refresh-cw" className="w-10 h-10 text-yellow-500 mx-auto mb-3 animate-spin" />
                                            <p className="text-stone-400 text-[10px] font-bold uppercase tracking-widest">กำลังดึงข้อมูล...</p>
                                        </div>
                                    ) : filteredHistory.length > 0 ? filteredHistory.map((item, idx) => (
                                        <div key={idx} className="bg-white p-5 rounded-[1.8rem] shadow-sm border border-stone-100 flex flex-col gap-4">
                                            <div className="flex justify-between items-start text-xs font-bold">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 bg-yellow-100 text-yellow-700 rounded-2xl flex items-center justify-center font-black text-lg shadow-inner">
                                                        {String(item["ชื่อพนักงานขาย"] || '?').substring(0, 1)}
                                                    </div>
                                                    <div>
                                                        <p className="text-stone-900 leading-tight">{item["ชื่อร้านค้า"]}</p>
                                                        <p className="text-stone-400 font-medium text-[10px]">{item["ชื่อพนักงานขาย"]}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-yellow-600 font-black">{String(item["วันที่บันทึก"] || '').split(' ')[1]?.substring(0, 5)} น.</p>
                                                    <p className="text-stone-300 text-[9px] uppercase">{String(item["วันที่บันทึก"] || '').split(' ')[0]}</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-2">
                                                {item["ลิงก์รูปภาพ"] && item["ลิงก์รูปภาพ"].startsWith('http') && (
                                                    <a href={item["ลิงก์รูปภาพ"]} target="_blank" className="flex-1 py-3 bg-blue-50 text-blue-700 rounded-2xl text-[10px] font-bold flex items-center justify-center gap-2"><Icon name="file-text" className="w-3.5 h-3.5" /> รูปภาพ</a>
                                                )}
                                                <a href={`https://www.google.com/maps/search/?api=1&query=${item["พิกัด GPS"]}`} target="_blank" className="flex-1 py-3 bg-green-50 text-green-700 rounded-2xl text-[10px] font-bold flex items-center justify-center gap-2"><Icon name="map-pin" className="w-3.5 h-3.5" /> แผนที่</a>
                                            </div>
                                        </div>
                                    )) : (
                                        <div className="text-center py-20 bg-white/50 rounded-[3rem] border border-dashed border-stone-200">
                                            <Icon name="search" className="w-10 h-10 text-stone-200 mx-auto mb-3" />
                                            <p className="text-stone-300 text-xs font-bold uppercase tracking-widest">ไม่พบประวัติ (โปรดเช็ควันที่เลือก)</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* BOTTOM NAV */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/90 backdrop-blur-xl border border-white/50 p-4 rounded-[2.5rem] shadow-2xl z-40 flex justify-around items-center">
                        <button onClick={() => setCurrentView('homeView')} className={`flex flex-col items-center gap-1 transition-all ${currentView === 'homeView' ? 'text-yellow-600 scale-110' : 'text-stone-300'}`}>
                            <Icon name="home" />
                            <span className="text-[9px] font-bold uppercase tracking-widest">หน้าหลัก</span>
                        </button>
                        <button onClick={() => setCurrentView('formView')} className={`flex flex-col items-center gap-1 transition-all ${currentView === 'formView' ? 'text-yellow-600 scale-110' : 'text-stone-300'}`}>
                            <Icon name="map-pin" />
                            <span className="text-[9px] font-bold uppercase tracking-widest">เช็คอิน</span>
                        </button>
                        <button onClick={() => setCurrentView('historyView')} className={`flex flex-col items-center gap-1 transition-all ${currentView === 'historyView' ? 'text-yellow-600 scale-110' : 'text-stone-300'}`}>
                            <Icon name="refresh-cw" />
                            <span className="text-[9px] font-bold uppercase tracking-widest">ประวัติ</span>
                        </button>
                    </nav>

                    {/* LOADING OVERLAY */}
                    {loading && (
                        <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-md z-50 flex items-center justify-center flex-col gap-5 text-white">
                            <div className="bg-white p-10 rounded-[3rem] shadow-2xl flex flex-col items-center gap-5">
                                <Icon name="refresh-cw" className="w-12 h-12 animate-spin text-[#FFC107]" />
